  <!-- Fade-in Animation CSS -->
  <style>
    .fade-text {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 1.2s ease-out forwards;
    }

    .fade-1 { animation-delay: 0.2s; }
    .fade-2 { animation-delay: 0.4s; }
    .fade-3 { animation-delay: 0.6s; }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body class="mood-page">

<main class="mood-container">

  <!-- Header -->
  <section class="mood-hero">
    <p class="mood-eyebrow fade-text fade-1">🎬 Cinema understands emotions</p>
    <h1 class="glassy-gold fade-text fade-2">How are you feeling right now?</h1>
    <p class="mood-intro fade-text fade-3">
      Choose a mood and we’ll suggest a movie that matches your state of mind.
    </p>
  </section>

  <!-- Language + Mood Selector -->
  <section class="mood-selector">

    <!-- Language -->
    <div class="language-selector">
      <span class="lang-icon fade-text fade-3" title="Select language">🌐</span>
      <button class="lang-btn active fade-text fade-3" data-lang="en">English</button>
      <button class="lang-btn fade-text fade-3" data-lang="hi">Hindi</button>
    </div>

    <!-- Moods -->
    <div class="mood-chips">
      <button class="mood-chip fade-text fade-3" data-mood="Tonight’s Picks">✨ Tonight’s Picks</button>
      <button class="mood-chip fade-text fade-3" data-mood="lonely">😔 Lonely</button>
      <button class="mood-chip fade-text fade-3" data-mood="comfort">😌 Comfort</button>
      <button class="mood-chip fade-text fade-3" data-mood="romantic">❤️ Romantic</button>
      <button class="mood-chip fade-text fade-3" data-mood="thoughtful">🧠 Thought-provoking</button>
      <button class="mood-chip fade-text fade-3" data-mood="intense">🔥 Intense</button>
      <button class="mood-chip fade-text fade-3" data-mood="Horror">🥶 Horror</button>
      <button class="mood-chip fade-text fade-3" data-mood="Comedy">😂 Comedy </button>
    </div>

  </section>

  <!-- Results -->
  <section class="mood-results" id="results"></section>

  <!-- Reload -->
  <button id="reloadBtn" style="display:none;">
    🎲 Show me different movies
  </button>

</main>

<!-- Sounds -->
<audio id="hoverSound" src="sounds/hover.mp3" preload="auto"></audio>
<audio id="clickSound" src="sounds/select.mp3" preload="auto"></audio>
<audio id="ambientSound" src="sounds/theatre-hum.mp3" loop preload="auto"></audio>

    btn.addEventListener("mouseenter", () => {
      hoverSound.currentTime = 0;
      hoverSound.volume = 0.25;
      hoverSound.play();
    });

    btn.addEventListener("click", () => {
      clickSound.currentTime = 0;
      clickSound.volume = 0.4;
      clickSound.play();

      // 🎞 Ambient theatre hum (fade in only once)

        ambientSound.play();

  let currentMood = "";
  let currentLanguage = "en";

  /* =========================
     UTILS
  ========================= */
  function shuffleArray(arr) {
    return arr.sort(() => Math.random() - 0.5);
  }

  function getMoviesByMood(mood, language) {
    const filtered = movies.filter(m =>
      m.mood.includes(mood) && m.language === language
    );
    return shuffleArray([...filtered]).slice(0, 3);
  }

  /* =========================
   DISPLAY RESULTS (TRAILER)
========================= */
function showResults(list) {
  const results = document.getElementById("results");
  results.innerHTML = "";

  list.forEach((movie, index) => {   // ✅ index added
    const card = document.createElement("div");
    card.className = "movie-card";

    // 🎬 stagger animation
    card.style.setProperty("--delay", `${index * 0.15}s`);

    card.innerHTML = `
      <div class="trailer-thumb">
        <a href="${movie.trailerUrl}" target="_blank" rel="noopener">
          <img src="${movie.thumbnail}" alt="${movie.title} trailer">
          <div class="play-btn">▶</div>
        </a>
      </div>

      <h3 class="glassy-gold movie-title">${movie.title}</h3>
      <p>${movie.line}</p>
    `;

    results.appendChild(card);       // ✅ REQUIRED
  });

  document.getElementById("reloadBtn").style.display = "block";
}


  /* =========================
     PLAY TRAILER ON CLICK
  ========================= */
  document.addEventListener("click", (e) => {
    const thumb = e.target.closest(".trailer-thumb");
    if (!thumb) return;

    const id = thumb.dataset.id;
    thumb.innerHTML = `
      <iframe
        src="https://www.youtube.com/embed/${id}?autoplay=1"
        frameborder="0"
        allow="autoplay; encrypted-media"
        allowfullscreen>
      </iframe>
    `;
  });

  /* =========================
     MOOD CLICK
  ========================= */
  document.querySelectorAll(".mood-chip").forEach(btn => {
    btn.addEventListener("click", () => {
      currentMood = btn.dataset.mood;
      showResults(getMoviesByMood(currentMood, currentLanguage));
    });
  });

document.querySelectorAll(".lang-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    clickSound.currentTime = 0;
    clickSound.volume = 0.35;
    clickSound.play();
  });
});

  /* =========================
     LANGUAGE SELECT
  ========================= */
  document.querySelectorAll(".lang-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".lang-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentLanguage = btn.dataset.lang;
    });
  });
  
 /* =========================
   RELOAD (with click sound)
========================= */
document.getElementById("reloadBtn").addEventListener("click", () => {

  // ✅ click sound
  clickSound.currentTime = 0;
  clickSound.volume = 0.4;
  clickSound.play();

  // ✅ reload results
  showResults(getMoviesByMood(currentMood, currentLanguage));
});


});
